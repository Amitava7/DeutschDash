version: "3.8"

services:
  mongodb:
    image: mongo:7.0
    container_name: deutschdash-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: deutschdash
    command: ["--replSet", "rs0", "--bind_ip_all"]
    healthcheck:
      test: |
        mongosh --quiet --eval "
          try { rs.status().ok } catch(e) {
            rs.initiate({_id:'rs0',members:[{_id:0,host:'localhost:27017'}]});
          }
        "
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  mongo_data:
